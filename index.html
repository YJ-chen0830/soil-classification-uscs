<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>土壤分類（USCS） | Unified Soil Classification System (USCS)</title>
<script src="https://yj-chen0830.github.io/jrh-core/jrh-core.js?v=3" defer></script>
<style>
  :root{--navy:#0b1f3a;--navy2:#13284a;--gold:#c9a14a;--gold2:#e0bf6e;--bg:#f5f3ee;--ink:#1c2530;--line:#d8d2c2;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Noto Sans TC","Segoe UI",sans-serif;background:var(--bg);color:var(--ink);}
  header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#f5f3ee;padding:28px 32px;}
  header h1{margin:0;font-size:22px;}
  header span{color:var(--gold2);font-size:13px;display:block;margin-top:4px;}
  main{max-width:1060px;margin:0 auto;padding:28px 20px 60px;}
  .grid{display:grid;grid-template-columns:340px 1fr;gap:24px;}
  @media(max-width:820px){.grid{grid-template-columns:1fr;}}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:22px 24px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
  .card h2{font-size:14.5px;margin:0 0 18px;color:var(--navy);font-weight:700;display:flex;align-items:center;gap:8px;border-bottom:2px solid var(--gold);padding-bottom:10px;}
  label{display:block;font-size:12px;color:#666;margin:10px 0 4px;font-weight:500;}
  input,select{width:100%;padding:8px 11px;border:1.5px solid var(--line);border-radius:7px;font-size:13.5px;background:#fafaf8;}
  input:focus,select:focus{outline:none;border-color:var(--gold);}
  .sec{font-size:12px;font-weight:700;color:var(--navy);margin:16px 0 6px;border-left:4px solid var(--gold);padding-left:9px;letter-spacing:.04em;text-transform:uppercase;}
  .note{font-size:11.5px;color:#999;margin-top:12px;line-height:1.75;background:#f9f7f2;border-radius:6px;padding:9px 12px;}
  button.calc-btn{margin-top:16px;width:100%;padding:12px;border:none;border-radius:8px;background:var(--navy);color:#fff;font-size:14.5px;font-weight:700;cursor:pointer;}
  button.calc-btn:hover{background:var(--navy2);}
  button.pro-btn{margin-top:12px;width:100%;padding:12px;border:none;border-radius:8px;background:var(--gold);color:var(--navy);font-size:14.5px;font-weight:700;cursor:pointer;}
  button.pro-btn:hover{filter:brightness(1.08);}
  table{width:100%;border-collapse:collapse;margin-top:10px;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  th{background:var(--navy);color:#f5f3ee;font-weight:600;font-size:12px;padding:9px 10px;text-align:left;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  td{padding:9px 10px;font-size:13px;border-bottom:1px solid var(--line);}
  tr:nth-child(even) td{background:#f9f7f3;}
  td:last-child{text-align:right;font-weight:700;}
  details.proc{margin-top:16px;border:1px solid var(--line);border-radius:8px;background:#fafaf8;overflow:hidden;}
  details.proc summary{cursor:pointer;padding:10px 14px;font-weight:700;font-size:13px;color:var(--navy);user-select:none;list-style:none;display:flex;align-items:center;gap:6px;}
  details.proc summary::before{content:"▶";font-size:10px;transition:transform .2s;}
  details[open].proc summary::before{transform:rotate(90deg);}
  details.proc pre{margin:0;padding:12px 16px 16px;font-family:"Courier New",monospace;font-size:11.5px;line-height:1.9;white-space:pre-wrap;color:#2c3e50;border-top:1px solid var(--line);}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .proj-section{background:#fff;border:1px solid var(--gold);border-radius:10px;padding:18px 22px;margin-bottom:20px;}
  .proj-section h3{margin:0 0 12px;color:var(--navy);font-size:14px;font-weight:700;}
  .proj-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media(max-width:600px){.proj-grid{grid-template-columns:1fr;}}
  .mob-tabs{display:none;}
  .checkline{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:13px;color:#444;}
  .checkline input{width:auto;transform:translateY(1px);}
  .warn{margin-top:12px;padding:10px 12px;border:1px solid #e0c19e;border-radius:8px;background:#fff8ee;color:#7a4f11;font-size:12px;line-height:1.7;}
  .symbol{display:inline-block;padding:6px 10px;border-radius:999px;background:var(--navy);color:#fff;font-weight:700;font-size:18px;letter-spacing:.04em;}
  .mini{font-size:12px;color:#666;margin-top:8px;line-height:1.7;}
  @media screen and (max-width:767px){
    .mob-tabs{display:flex;background:var(--bg);border-bottom:2px solid var(--line);margin:0 -20px 0;padding:0 20px;}
    .mob-tab{flex:1;padding:11px 4px;text-align:center;font-size:13.5px;font-weight:700;color:#888;cursor:pointer;background:transparent;border:none;border-bottom:3px solid transparent;}
    .mob-tab.active{color:var(--navy);border-bottom-color:var(--gold);}
    .grid{display:block;}
    .grid>.card{display:none;}
    .grid>.card.mob-active{display:block;}
  }
  @media print{
    header,.no-print{display:none!important;}
    body{background:#fff;margin:0;font-size:9pt;line-height:1.5;color:#111;}
    main{padding:0;max-width:100%!important;}
    .grid{grid-template-columns:1fr!important;gap:10pt!important;}
    .card{box-shadow:none!important;border:1px solid #ccc!important;border-radius:4pt!important;padding:10pt 12pt!important;break-inside:avoid;}
    .card h2{font-size:10.5pt!important;padding-bottom:6pt!important;margin-bottom:9pt!important;}
    label{font-size:8pt!important;margin:6pt 0 2pt!important;}
    .sec{font-size:8pt!important;margin:10pt 0 4pt!important;}
    .note,.warn,.mini{font-size:7.5pt!important;padding:6pt 9pt!important;}
    table{border:1px solid #bbb!important;border-radius:0!important;margin-top:6pt!important;}
    th{font-size:8pt!important;padding:5pt 7pt!important;background:#0b1f3a!important;color:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    td{font-size:8.5pt!important;padding:5pt 7pt!important;}
    tr:nth-child(even) td{background:#f5f5f5!important;}
    details.proc{display:block!important;margin-top:10pt!important;border:1pt solid #0b1f3a!important;border-radius:4pt!important;break-inside:avoid;background:#f9f9f6!important;}
    details.proc>summary{display:none!important;}
    details.proc::before{content:"📋  判定過程（供第三方檢核）";display:block;font-weight:700;font-size:8pt;color:#0b1f3a;padding:6pt 10pt 4pt;border-bottom:1px solid #ccc;letter-spacing:.04em;}
    details.proc>pre{font-size:7pt!important;line-height:1.65!important;white-space:pre-wrap!important;padding:6pt 10pt 10pt!important;color:#1a1a1a!important;font-family:"Courier New",monospace!important;}
    .proj-section{border:1.5pt solid #0b1f3a!important;border-radius:4pt!important;}
    button.pro-btn,button.calc-btn{display:none!important;}
    @page{margin:15mm 12mm;size:A4;}
  }
</style>
</head>
<body data-tool="scu">
<header>
  <a href="https://yj-chen0830.github.io/engineering-hub/" style="color:var(--gold2);font-size:12.5px;text-decoration:none;display:inline-block;margin-bottom:8px;">← 返回工程計算中心</a>
  <h1>土壤分類（USCS）</h1>
  <span>依統一土壤分類系統（USCS）流程判定土壤分類代號</span>
</header>
<main>

<div class="proj-section no-print" id="projSection">
  <h3>📁 專案資訊（列印時帶入計算書封面）</h3>
  <div class="proj-grid">
    <div><label>工程名稱</label><input id="pj-name" placeholder="○○工程"></div>
    <div><label>工程地點</label><input id="pj-loc" placeholder="○○市○○區"></div>
    <div><label>承造廠商</label><input id="pj-contractor" placeholder="○○營造股份有限公司"></div>
    <div><label>文件編號</label><input id="pj-docno" placeholder="SCU-CAL-001"></div>
    <div><label>計算者</label><input id="pj-calc" placeholder="姓名"></div>
    <div><label>審核者</label><input id="pj-review" placeholder="姓名"></div>
    <div><label>計算日期</label><input id="pj-date" type="date"></div>
  </div>
</div>

<div class="mob-tabs">
  <button class="mob-tab active" onclick="switchMobTab('scu-in',this)">📋 輸入參數</button>
  <button class="mob-tab" id="mobTab-scu-r" onclick="switchMobTab('scu-r',this)">📊 判定結果</button>
</div>
<div class="grid">
  <div class="card mob-active" data-tab="scu-in">
    <h2>輸入參數</h2>

    <div class="sec">篩分析</div>
    <div class="row2">
      <div><label>通過 #4 篩百分比 P4 (%)</label><input id="scu-p4" type="number" step="0.1" min="0" max="100" placeholder="例如 60"></div>
      <div><label>通過 #200 篩百分比 P200 (%)</label><input id="scu-p200" type="number" step="0.1" min="0" max="100" placeholder="例如 10"></div>
    </div>

    <div class="sec">粗粒土壤用級配參數（P200 &lt; 50%）</div>
    <div class="row2">
      <div><label>均勻係數 Cu（選填）</label><input id="scu-cu" type="number" step="0.01" min="0" placeholder="例如 6.5"></div>
      <div><label>曲率係數 Cc（選填）</label><input id="scu-cc" type="number" step="0.01" min="0" placeholder="例如 1.8"></div>
    </div>

    <div class="sec">細粒土壤或含細料判定用 Atterberg 限度</div>
    <div class="row2">
      <div><label>液性限度 LL (%)</label><input id="scu-ll" type="number" step="0.1" min="0" placeholder="例如 35"></div>
      <div><label>塑性限度 PL (%)</label><input id="scu-pl" type="number" step="0.1" min="0" placeholder="例如 18"></div>
    </div>

    <label class="checkline"><input id="scu-organic" type="checkbox">是否含明顯有機物（目視判定）</label>

    <button class="calc-btn" onclick="calcSCU()">判定土壤分類</button>
    <div class="note">依 ASTM D2487 標準流程圖簡化實作。粗粒土先判定細粒料含量與砂/礫主成分，再依級配或塑性圖分類；細粒土依塑性圖與液性限度判定。邊界案例仍應以合格試驗室完整資料與技師專業判讀為準。</div>
  </div>

  <div class="card" data-tab="scu-r">
    <h2>判定結果</h2>
    <div id="scu-result"><p style="color:#888">尚未判定</p></div>
    <details class="proc" id="scu-proc" style="display:none">
      <summary>📋 判定過程（供第三方檢核）</summary>
      <pre id="scu-proc-text"></pre>
    </details>
    <button class="pro-btn no-print" onclick="openPro()">📄 產出計算書 PDF</button>
  </div>
</div>

</main>
<script>
function switchMobTab(name,btn){
  btn.parentElement.querySelectorAll('.mob-tab').forEach(function(t){t.classList.remove('active');});
  btn.classList.add('active');
  btn.parentElement.nextElementSibling.querySelectorAll('.card').forEach(function(c){
    c.classList.toggle('mob-active',c.dataset.tab===name);
  });
}
function openPro(){ JRH.checkEmail(function(){ jrhPrint('土壤分類（USCS）判定報告'); }); }
function f1(x){return Number(x).toFixed(1);}
function f2(x){return Number(x).toFixed(2);}
function hasVal(id){return document.getElementById(id).value.trim()!=='';}
function num(id){return parseFloat(document.getElementById(id).value);}
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];});}

function buildPlasticityInfo(LL,PL,organic,allowOrganicSymbol,allowDualSymbol){
  var PI = LL - PL;
  var PIA = 0.73 * (LL - 20);
  var level = LL < 50 ? 'L' : 'H';
  var diff = PI - PIA;
  var lines = [];
  lines.push('計算 PI = LL − PL = ' + f2(LL) + ' − ' + f2(PL) + ' = ' + f2(PI));
  lines.push('A-line：PI_Aline = 0.73 × (LL − 20) = 0.73 × (' + f2(LL) + ' − 20) = ' + f2(PIA));
  lines.push('LL = ' + f2(LL) + (LL < 50 ? ' < 50 → 低塑性 L' : ' ≥ 50 → 高塑性 H'));

  var symbol = '';
  var groupText = '';
  if (allowDualSymbol && PI >= 4 && PI <= 7 && Math.abs(diff) <= 1) {
    symbol = 'CL-ML';
    groupText = 'PI 落在 4–7 且接近 A-line，屬塑性圖斜線帶 → CL-ML';
  } else if (PI > PIA && PI > 7) {
    symbol = 'C' + level;
    groupText = 'PI > PI_Aline 且 PI > 7 → 黏土（C）→ ' + symbol;
  } else {
    if (allowOrganicSymbol && organic) {
      symbol = 'O' + level;
      groupText = 'PI 未落入黏土區，且勾選明顯有機物 → 有機細粒土 → ' + symbol;
    } else {
      symbol = 'M' + level;
      groupText = 'PI < PI_Aline 或 PI < 4，未落入黏土區 → 粉土（M）→ ' + symbol;
    }
  }
  lines.push(groupText);
  return {PI:PI, PIA:PIA, level:level, symbol:symbol, text:lines};
}

function classifyUSCS(input){
  var path = [];
  var notes = [];
  var warnings = [];

  if (isNaN(input.P4) || isNaN(input.P200)) {
    return {error:'請至少輸入 P4 與 P200。'};
  }
  if (input.P4 < 0 || input.P4 > 100 || input.P200 < 0 || input.P200 > 100) {
    return {error:'P4 與 P200 必須介於 0% 至 100% 之間。'};
  }
  if (input.P200 > input.P4) {
    return {error:'P200 不可大於 P4；因為通過 #200 篩者必然也通過 #4 篩。'};
  }

  var result = {
    soilType: '',
    symbol: '',
    mainGroup: '',
    path: [],
    procLines: [],
    meta: {}
  };

  path.push('P200 = ' + f2(input.P200) + '%');

  if (input.P200 >= 50) {
    result.soilType = '細粒土壤 Fine-grained';
    path.push('P200 ≥ 50% → 細粒土壤');
    if (isNaN(input.LL) || isNaN(input.PL)) {
      return {error:'P200 ≥ 50% 時，需輸入 LL 與 PL 才能依塑性圖判定。'};
    }
    if (input.PL > input.LL) {
      return {error:'PL 不可大於 LL。'};
    }
    var fp = buildPlasticityInfo(input.LL,input.PL,input.organic,true,true);
    Array.prototype.push.apply(path, fp.text);
    result.symbol = fp.symbol;
    result.mainGroup = fp.level === 'L' ? '低塑性細粒土' : '高塑性細粒土';
    result.meta.PI = fp.PI;
    result.meta.PIA = fp.PIA;
    result.meta.LL = input.LL;
    result.meta.PL = input.PL;
    result.path = path;
    result.procLines = path.slice();
    return result;
  }

  result.soilType = '粗粒土壤 Coarse-grained';
  path.push('P200 < 50% → 粗粒土壤');

  var coarseFraction = 100 - input.P200;
  var gravel = 100 - input.P4;
  var sand = input.P4 - input.P200;
  result.meta.coarseFraction = coarseFraction;
  result.meta.gravel = gravel;
  result.meta.sand = sand;
  path.push('粗粒部分 = 100 − P200 = ' + f2(coarseFraction) + '%');
  path.push('礫石部分（留置於 #4）= 100 − P4 = ' + f2(gravel) + '%');
  path.push('砂部分（通過 #4 且留置於 #200）= P4 − P200 = ' + f2(sand) + '%');

  var primary = gravel > sand ? 'G' : 'S';
  path.push((primary === 'G' ? '礫石部分' : '砂部分') + '占粗粒部分較多 → 主成分為 ' + (primary === 'G' ? '礫石 G' : '砂 S'));

  if (input.P200 < 5) {
    path.push('細粒料含量 P200 < 5% → 依級配判定 W / P');
    if (isNaN(input.Cu) || isNaN(input.Cc)) {
      return {error:'粗粒土且細粒料 < 5% 時，需輸入 Cu 與 Cc 才能判定 W 或 P。'};
    }
    var wellGraded = primary === 'G'
      ? (input.Cu >= 4 && input.Cc >= 1 && input.Cc <= 3)
      : (input.Cu >= 6 && input.Cc >= 1 && input.Cc <= 3);
    path.push(primary === 'G'
      ? '礫石 W 條件：Cu ≥ 4 且 1 ≤ Cc ≤ 3'
      : '砂 W 條件：Cu ≥ 6 且 1 ≤ Cc ≤ 3');
    path.push('Cu = ' + f2(input.Cu) + '，Cc = ' + f2(input.Cc) + ' → ' + (wellGraded ? '符合 well-graded 條件' : '不符合 well-graded 條件'));
    result.symbol = primary + (wellGraded ? 'W' : 'P');
    result.mainGroup = primary === 'G' ? '潔淨礫石' : '潔淨砂';
    result.meta.Cu = input.Cu;
    result.meta.Cc = input.Cc;
    result.path = path;
    result.procLines = path.slice();
    return result;
  }

  if (input.P200 > 12) {
    path.push('細粒料含量 P200 > 12% → 依細粒料塑性判定 M / C');
    if (isNaN(input.LL) || isNaN(input.PL)) {
      return {error:'粗粒土且細粒料 > 12% 時，需輸入 LL 與 PL 才能判定 GM/GC 或 SM/SC。'};
    }
    if (input.PL > input.LL) {
      return {error:'PL 不可大於 LL。'};
    }
    var cp = buildPlasticityInfo(input.LL,input.PL,input.organic,false,false);
    Array.prototype.push.apply(path, cp.text);
    var fineLetter = cp.symbol.charAt(0) === 'C' ? 'C' : 'M';
    result.symbol = primary + fineLetter;
    result.mainGroup = primary === 'G' ? '含細料礫石' : '含細料砂';
    result.meta.PI = cp.PI;
    result.meta.PIA = cp.PIA;
    result.meta.LL = input.LL;
    result.meta.PL = input.PL;
    result.path = path;
    result.procLines = path.slice();
    return result;
  }

  path.push('細粒料含量 5%–12%（含邊界）→ 雙符號過渡區');
  if (isNaN(input.LL) || isNaN(input.PL)) {
    return {error:'粗粒土且細粒料介於 5%–12% 時，需輸入 LL 與 PL 以決定雙符號中的 M 或 C。'};
  }
  if (input.PL > input.LL) {
    return {error:'PL 不可大於 LL。'};
  }
  var dp = buildPlasticityInfo(input.LL,input.PL,input.organic,false,false);
  Array.prototype.push.apply(path, dp.text);
  var cleanWellGraded = false;
  if (!isNaN(input.Cu) && !isNaN(input.Cc)) {
    cleanWellGraded = primary === 'G'
      ? (input.Cu >= 4 && input.Cc >= 1 && input.Cc <= 3)
      : (input.Cu >= 6 && input.Cc >= 1 && input.Cc <= 3);
    path.push('同時檢查級配：Cu = ' + f2(input.Cu) + '，Cc = ' + f2(input.Cc) + ' → ' + (cleanWellGraded ? 'W' : 'P'));
  } else {
    path.push('未提供 Cu/Cc，依 USCS 過渡區慣例保守採 P 作為粗粒級配字首。');
    warnings.push('5%–12% 過渡區未填 Cu/Cc，雙符號前半段以 P 代替 W/P 級配判定。');
  }
  var firstLetter = cleanWellGraded ? 'W' : 'P';
  var secondLetter = dp.symbol.charAt(0) === 'C' ? 'C' : 'M';
  result.symbol = primary + firstLetter + '-' + primary + secondLetter;
  result.mainGroup = primary === 'G' ? '過渡區礫石' : '過渡區砂';
  notes.push('5%–12% 細粒料屬 USCS 雙符號區，結果同時反映粗粒級配與細粒塑性。');
  result.meta.PI = dp.PI;
  result.meta.PIA = dp.PIA;
  result.meta.LL = input.LL;
  result.meta.PL = input.PL;
  result.meta.Cu = input.Cu;
  result.meta.Cc = input.Cc;
  result.path = path.concat(notes);
  result.procLines = path.concat(notes, warnings);
  result.warnings = warnings;
  return result;
}

function renderResult(outcome,input){
  var html = '';
  if (outcome.error) {
    html = '<div class="warn">' + esc(outcome.error) + '</div>';
    document.getElementById('scu-result').innerHTML = html;
    document.getElementById('scu-proc').style.display = 'none';
    return;
  }

  var rows = '';
  rows += '<tr><td>分類結果 USCS Symbol</td><td><span class="symbol">' + esc(outcome.symbol) + '</span></td></tr>';
  rows += '<tr><td>土壤大類</td><td>' + esc(outcome.soilType) + '</td></tr>';
  rows += '<tr><td>判定群組</td><td>' + esc(outcome.mainGroup) + '</td></tr>';
  rows += '<tr><td>P4 / P200</td><td>' + f2(input.P4) + '% / ' + f2(input.P200) + '%</td></tr>';
  if (!isNaN(outcome.meta.LL) && !isNaN(outcome.meta.PL)) {
    rows += '<tr><td>LL / PL / PI / PI_Aline</td><td>' + f2(outcome.meta.LL) + '% / ' + f2(outcome.meta.PL) + '% / ' + f2(outcome.meta.PI) + ' / ' + f2(outcome.meta.PIA) + '</td></tr>';
  }
  if (!isNaN(outcome.meta.coarseFraction)) {
    rows += '<tr><td>粗粒部分 / 礫石部分 / 砂部分</td><td>' + f2(outcome.meta.coarseFraction) + '% / ' + f2(outcome.meta.gravel) + '% / ' + f2(outcome.meta.sand) + '%</td></tr>';
  }
  if (!isNaN(outcome.meta.Cu) || !isNaN(outcome.meta.Cc)) {
    rows += '<tr><td>Cu / Cc</td><td>' + (isNaN(outcome.meta.Cu) ? '—' : f2(outcome.meta.Cu)) + ' / ' + (isNaN(outcome.meta.Cc) ? '—' : f2(outcome.meta.Cc)) + '</td></tr>';
  }
  html += '<table><tr><th>項目</th><th>數值</th></tr>' + rows + '</table>';
  html += '<div class="mini">判定路徑：' + esc(outcome.path.join(' → ')) + '</div>';
  if (outcome.warnings && outcome.warnings.length) {
    html += '<div class="warn">' + esc(outcome.warnings.join(' ')) + '</div>';
  }
  document.getElementById('scu-result').innerHTML = html;

  var p = '';
  p += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
  p += '  土壤分類（USCS）判定過程\n';
  p += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
  p += '【輸入條件】\n';
  p += '  P4 = ' + f2(input.P4) + '%\n';
  p += '  P200 = ' + f2(input.P200) + '%\n';
  p += '  Cu = ' + (isNaN(input.Cu) ? '未輸入' : f2(input.Cu)) + '\n';
  p += '  Cc = ' + (isNaN(input.Cc) ? '未輸入' : f2(input.Cc)) + '\n';
  p += '  LL = ' + (isNaN(input.LL) ? '未輸入' : f2(input.LL)) + '%\n';
  p += '  PL = ' + (isNaN(input.PL) ? '未輸入' : f2(input.PL)) + '%\n';
  p += '  明顯有機物 = ' + (input.organic ? '是' : '否') + '\n\n';
  p += '【判定路徑】\n';
  outcome.procLines.forEach(function(line,idx){
    p += '  ' + (idx + 1) + '. ' + line + '\n';
  });
  p += '\n【分類結果】\n';
  p += '  USCS = ' + outcome.symbol + '\n';
  p += '  土壤大類 = ' + outcome.soilType + '\n';
  p += '  判定群組 = ' + outcome.mainGroup + '\n\n';
  p += '【說明】\n';
  p += '  本工具依 ASTM D2487 流程圖簡化實作，用於快速輔助判定。\n';
  p += '  正式工程分類應以完整篩分析與 Atterberg 限度試驗成果為準，並由大地工程技師複核邊界案例。\n';
  p += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━';

  document.getElementById('scu-proc-text').textContent = p;
  document.getElementById('scu-proc').style.display = '';
}

function calcSCU(){
  var input = {
    P4: num('scu-p4'),
    P200: num('scu-p200'),
    Cu: num('scu-cu'),
    Cc: num('scu-cc'),
    LL: num('scu-ll'),
    PL: num('scu-pl'),
    organic: document.getElementById('scu-organic').checked
  };
  var outcome = classifyUSCS(input);
  renderResult(outcome,input);
  if (!outcome.error && window.innerWidth < 768) {
    var b = document.getElementById('mobTab-scu-r');
    if (b) switchMobTab('scu-r',b);
  }
}
